<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 内容工具箱 - 小红书/抖音/公众号 文案生成</title>
<meta name="description" content="一站式内容创作工具。支持小红书爆款文案、抖音短视频脚本、公众号长文。先选标题再写全文，不满意还能精修。">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <div class="container">
    <h1 class="logo">AI 内容工具箱</h1>
    <p class="tagline">小红书 · 抖音 · 公众号 · 一个工具全搞定</p>
  </div>
</header>

<main class="main container">
  <div class="tool-card">
    <div class="tool-header">
      <!-- Platform tabs -->
      <div class="platform-tabs" id="platformTabs">
        <button class="platform-tab active" data-platform="xiaohongshu">🔥 小红书</button>
        <button class="platform-tab" data-platform="douyin">🎬 抖音脚本</button>
        <button class="platform-tab" data-platform="gongzhonghao">📰 公众号</button>
      </div>
      <p class="tool-desc" id="toolDesc">输入主题 → 挑选标题 → 一键生成全文</p>
    </div>

    <div class="tool-body">
      <!-- Input -->
      <div class="input-section">
        <div class="form-group">
          <label for="topic" id="topicLabel">写作主题 <span class="required">*</span></label>
          <textarea id="topic" placeholder="" rows="3"></textarea>
        </div>

        <div class="form-row" id="formRow">
          <div class="form-group">
            <label for="styleSelect">内容风格</label>
            <select id="styleSelect"></select>
          </div>
          <div class="form-group">
            <label for="toneSelect">语气风格</label>
            <select id="toneSelect"></select>
          </div>
          <div class="form-group">
            <label for="lengthSelect" id="lengthLabel">篇幅</label>
            <select id="lengthSelect"></select>
          </div>
        </div>

        <button id="genTitleBtn" class="btn btn-primary">
          <span class="btn-text">✨ 生成标题</span>
          <span class="btn-loading" style="display:none">生成中...</span>
        </button>
        <div class="limit-info">今日剩余 <strong id="remainCount">30</strong> 次</div>
      </div>

      <!-- Titles -->
      <div id="titleSection" class="title-section" style="display:none">
        <div class="title-header">
          <h3 id="titleSectionTitle">选择一个标题</h3>
          <button class="btn btn-sm" id="regenerateTitlesBtn">🔄 换一批</button>
        </div>
        <div id="titleList" class="title-list"></div>
        <div id="titleError" class="title-error" style="display:none"></div>
        <button id="genPostBtn" class="btn btn-primary btn-gen-post" disabled>
          <span class="btn-text">📝 基于选中标题写全文</span>
          <span class="btn-loading" style="display:none">写作中...</span>
        </button>
      </div>

      <!-- Output -->
      <div id="outputSection" class="output-section" style="display:none">
        <div class="output-header">
          <h3>生成结果</h3>
          <div class="output-actions">
            <button class="btn btn-sm" id="copyBtn">📋 复制</button>
            <button class="btn btn-sm" id="resetBtn">🔄 重写一篇</button>
          </div>
        </div>
        <div class="output-content" id="outputContent">
          <div class="output-title" id="outputTitle"></div>
          <div class="output-body" id="outputBody"></div>
        </div>

        <div class="refine-section">
          <label>不满意？告诉我想怎么改</label>
          <div class="refine-row">
            <input type="text" id="refineInput" placeholder="例如：多发点emoji / 更多细节 / 缩短一半..." />
            <button class="btn btn-sm" id="refineBtn">按这个改</button>
          </div>
          <div class="quick-refines" id="quickRefines"></div>
        </div>
      </div>

      <div id="errorSection" class="error-section" style="display:none">
        <div class="error-msg" id="errorMsg"></div>
      </div>
    </div>
  </div>

  <div class="features-section" id="featuresSection">
    <h3 id="featuresTitle">支持的内容类型</h3>
    <div class="features-grid" id="featuresGrid"></div>
  </div>
</main>

<footer class="footer">
  <div class="container">
    <p>AI 内容工具箱 · 免费在线工具</p>
  </div>
</footer>
<div class="toast"></div>
<script src="app.js"></script>
</body>
</html>
