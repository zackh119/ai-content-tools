<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人财务记账仪表盘</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#0f0f1a;color:#e0e0e0;min-height:100vh}
.header{background:linear-gradient(135deg,#1a1a2e,#2d1b69);padding:30px 40px;border-bottom:1px solid #2a2a4a}
.header h1{font-size:24px;color:#fff}
.header p{font-size:13px;color:#888;margin-top:4px}
.container{max-width:1200px;margin:0 auto;padding:20px}

.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.kpi-card{background:#1a1a2e;border-radius:12px;padding:20px;border:1px solid #2a2a4a}
.kpi-card .label{font-size:12px;color:#888;margin-bottom:6px}
.kpi-card .value{font-size:28px;font-weight:700;color:#fff}
.kpi-card.income .value{color:#4caf50}
.kpi-card.expense .value{color:#f44336}

.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.chart-card{background:#1a1a2e;border-radius:12px;padding:20px;border:1px solid #2a2a4a}
.chart-card h3{font-size:14px;color:#aaa;margin-bottom:16px}
.chart-card canvas{width:100%!important;max-height:280px}

.section{background:#1a1a2e;border-radius:12px;padding:20px;border:1px solid #2a2a4a;margin-bottom:16px}
.section h3{font-size:14px;color:#aaa;margin-bottom:12px}
.input-group{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.input-group input,.input-group select{padding:8px 12px;background:#0f0f1a;border:1px solid #2a2a4a;border-radius:6px;color:#e0e0e0;font-size:13px}
.input-group input:focus,.input-group select:focus{outline:none;border-color:#667eea}
.btn{background:#667eea;color:#fff;border:none;padding:8px 20px;border-radius:6px;font-size:13px;cursor:pointer;font-weight:600}
.btn:hover{background:#5a6fd6}
.btn-danger{background:#f44336}
.btn-danger:hover{background:#d32f2f}

table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 12px;background:#2a2a4a;color:#aaa;font-weight:500}
td{padding:8px 12px;border-bottom:1px solid #2a2a4a}
.income{color:#4caf50}
.expense{color:#f44336}

@media(max-width:768px){.kpi-row,.chart-row{grid-template-columns:1fr}.header{padding:20px}}
</style>
</head>
<body>

<div class="header">
  <h1>💰 个人财务记账仪表盘</h1>
  <p>记录收支 · 自动统计 · 图表分析</p>
</div>

<div class="container">
  <div class="section">
    <h3>✏️ 添加记录</h3>
    <div class="input-group">
      <input type="date" id="entryDate" />
      <input type="text" id="entryDesc" placeholder="描述（如：工资/吃饭）" style="width:200px" />
      <select id="entryType"><option value="收入">收入</option><option value="支出" selected>支出</option></select>
      <input type="text" id="entryAmount" placeholder="金额" style="width:120px" />
      <select id="entryCat">
        <option value="餐饮">餐饮</option><option value="交通">交通</option><option value="购物">购物</option>
        <option value="娱乐">娱乐</option><option value="居住">居住</option><option value="工资">工资</option>
        <option value="兼职">兼职</option><option value="投资">投资</option><option value="其他">其他</option>
      </select>
      <button class="btn" onclick="addEntry()">➕ 添加</button>
    </div>
  </div>

  <div class="kpi-row">
    <div class="kpi-card income"><div class="label">本月收入</div><div class="value" id="monthIncome">¥0</div></div>
    <div class="kpi-card expense"><div class="label">本月支出</div><div class="value" id="monthExpense">¥0</div></div>
    <div class="kpi-card"><div class="label">本月结余</div><div class="value" id="monthBalance">¥0</div></div>
    <div class="kpi-card"><div class="label">总笔数</div><div class="value" id="totalEntries">0</div></div>
  </div>

  <div class="chart-row">
    <div class="chart-card"><h3>📊 支出分类占比</h3><canvas id="pieChart"></canvas></div>
    <div class="chart-card"><h3>📈 每日收支趋势</h3><canvas id="lineChart"></canvas></div>
  </div>

  <div class="section">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <h3>📋 所有记录</h3>
      <button class="btn btn-danger" onclick="if(confirm('确定清除所有数据？'))clearAll()">🗑️ 清除</button>
    </div>
    <table><thead><tr><th>日期</th><th>描述</th><th>类别</th><th>类型</th><th>金额</th><th></th></tr></thead><tbody id="tableBody"></tbody></table>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
let entries = JSON.parse(localStorage.getItem('finance_data') || '[]');
let pieChart = null, lineChart = null;

function save() { localStorage.setItem('finance_data', JSON.stringify(entries)); }

function addEntry() {
  const date = document.getElementById('entryDate').value;
  const desc = document.getElementById('entryDesc').value.trim();
  const type = document.getElementById('entryType').value;
  const amount = parseFloat(document.getElementById('entryAmount').value);
  const cat = document.getElementById('entryCat').value;
  if (!desc || !amount) { alert('请输入描述和金额'); return; }
  entries.push({ id: Date.now(), date: date || new Date().toISOString().slice(0,10), desc, type, amount, cat });
  save(); updateAll();
  document.getElementById('entryDesc').value = ''; document.getElementById('entryAmount').value = '';
}

function deleteEntry(id) { entries = entries.filter(e => e.id !== id); save(); updateAll(); }
function clearAll() { entries = []; save(); updateAll(); }

function getMonthKey() { const d = new Date(); return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0'); }

function updateAll() {
  const monthKey = getMonthKey();
  const monthEntries = entries.filter(e => e.date.startsWith(monthKey));
  const income = monthEntries.filter(e => e.type === '收入').reduce((s, e) => s + e.amount, 0);
  const expense = monthEntries.filter(e => e.type === '支出').reduce((s, e) => s + e.amount, 0);

  document.getElementById('monthIncome').textContent = '¥' + income.toLocaleString();
  document.getElementById('monthExpense').textContent = '¥' + expense.toLocaleString();
  document.getElementById('monthBalance').textContent = '¥' + (income - expense).toLocaleString();
  document.getElementById('totalEntries').textContent = monthEntries.length;

  // Table
  const recent = [...entries].reverse().slice(0, 30);
  document.getElementById('tableBody').innerHTML = recent.map(e =>
    '<tr><td>' + e.date + '</td><td>' + e.desc + '</td><td>' + e.cat + '</td><td class="' + (e.type === '收入' ? 'income' : 'expense') + '">' + e.type + '</td><td class="' + (e.type === '收入' ? 'income' : 'expense') + '">¥' + e.amount.toLocaleString() + '</td><td><button class="btn btn-danger" style="padding:4px 10px;font-size:11px" onclick="deleteEntry(' + e.id + ')">✕</button></td></tr>'
  ).join('');

  // Pie chart (expense by category)
  const catData = {};
  monthEntries.filter(e => e.type === '支出').forEach(e => { catData[e.cat] = (catData[e.cat] || 0) + e.amount; });
  const cats = Object.keys(catData);
  const vals = Object.values(catData);
  const colors = ['#667eea','#f093fb','#4fc3f7','#81c784','#ffb74d','#e57373','#ba68c8','#4db6ac','#ff8a65'];
  if (pieChart) pieChart.destroy();
  pieChart = new Chart(document.getElementById('pieChart'), { type: 'doughnut', data: { labels: cats, datasets: [{ data: vals, backgroundColor: colors }] }, options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { color: '#888', padding: 12 } } } } });

  // Line chart (daily trend)
  const dayData = {};
  monthEntries.forEach(e => {
    const d = e.date.slice(5);
    if (!dayData[d]) dayData[d] = { income: 0, expense: 0 };
    if (e.type === '收入') dayData[d].income += e.amount;
    else dayData[d].expense += e.amount;
  });
  const days = Object.keys(dayData).sort();
  const incData = days.map(d => dayData[d].income);
  const expData = days.map(d => dayData[d].expense);
  if (lineChart) lineChart.destroy();
  lineChart = new Chart(document.getElementById('lineChart'), { type: 'line', data: { labels: days, datasets: [
    { label: '收入', data: incData, borderColor: '#4caf50', tension: .3 },
    { label: '支出', data: expData, borderColor: '#f44336', tension: .3 }
  ]}, options: { responsive: true, plugins: { legend: { labels: { color: '#888', boxWidth: 12 } } }, scales: { x: { ticks: { color: '#888' } }, y: { ticks: { color: '#888' } } } } });
}

document.getElementById('entryDate').value = new Date().toISOString().slice(0,10);
updateAll();
</script>
</body>
</html>
